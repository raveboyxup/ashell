name: Build Windows Release

on:
  workflow_dispatch: # 允许你手动点击按钮触发编译

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    # 默认拉取当前最新的 main 分支代码
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Rust toolchain
      uses: actions/setup-rust@v1
      with:
        rust-version: stable
        target: x86_64-pc-windows-msvc

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

    - name: Cache Cargo packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build with Gradle
      run: |
        if (Test-Path "gradlew.bat") {
          .\gradlew.bat build
        } else {
          echo "No gradlew.bat found, skipping gradle build."
        }
      continue-on-error: true
      
    - name: Build Rust Standalone (Fallback)
      run: |
        if (Test-Path "Cargo.toml") { cargo build --release }
        if (Test-Path "rust/Cargo.toml") { cd rust; cargo build --release }
      continue-on-error: true

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ashell-windows-binary
        path: |
          **/build/libs/*.jar
          **/build/distributions/*.zip
          **/target/release/*.exe
          **/target/release/*.dll
